name: Release

on:
   workflow_dispatch:
   push:
      branches: [main]

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

env:
   REGISTRY: ghcr.io
   GITHUB_REPO: ${{ github.repository }}
   RELEASE_VERSION: 0.0.${{ github.run_number }}

jobs:
   docker:
      permissions:
         contents: read
         packages: write

      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6
           with:
              submodules: true

         - name: Log in to the Container registry
           uses: docker/login-action@v4
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Extract metadata (tags, labels) for Docker
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ${{ env.REGISTRY }}/${{ env.GITHUB_REPO }}
              tags: |
                 type=raw,value=latest
                 type=raw,value=stable,enable=${{ github.event_name == 'release' }}
                 type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
                 type=sha,priority=250,enable=${{ github.event_name != 'release' }}

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2

         - name: Install Dependencies
           run: bun install --frozen-lockfile

         - name: Cache downloads
           id: downloads-cache
           uses: actions/cache@v6
           with:
              path: .assembler/install
              key: mods-${{ hashFiles('pack/index.toml') }}
              restore-keys: |
                 mods-

         - name: Download mods
           if: steps.downloads-cache.outputs.cache-hit != 'true'
           run: bun run download

         - name: Update release properties
           run: bun run assemble

         - name: Build and push Docker image
           uses: docker/build-push-action@v6
           with:
              context: pack
              file: ../Dockerfile
              push: true
              tags: ${{ steps.meta.outputs.tags }}
              labels: ${{ steps.meta.outputs.labels }}
